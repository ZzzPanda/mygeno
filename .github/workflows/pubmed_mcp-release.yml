name: pubmed_mcp · Release

on:
  push:
    tags:
      - "pubmed_mcp-v*"

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/pmid_downloader

jobs:
  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - id: parse
        run: |
          tag="${GITHUB_REF##*/}"
          version="${tag#pubmed_mcp-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing pubmed_mcp v$version"

  docker:
    name: Multi-arch image → GHCR
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=v${{ needs.meta.outputs.version }}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: pubmed_mcp
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pubmed_mcp
          cache-to: type=gha,mode=max,scope=pubmed_mcp

  binaries:
    name: Build binary · ${{ matrix.target }}
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-13
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: pubmed_mcp
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: pubmed_mcp -> target
          key: ${{ matrix.target }}

      - name: Install cross (linux musl)
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: cargo install --locked cross

      - name: Build (cross)
        if: contains(matrix.target, 'linux-musl')
        shell: bash
        run: cross build --release --bin pmid_downloader --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !contains(matrix.target, 'linux-musl') }}
        shell: bash
        run: cargo build --release --bin pmid_downloader --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="pmid_downloader-v${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/pmid_downloader" "dist/$name/"
          cp README.md ../LICENSE 2>/dev/null || true
          cp -r migrations "dist/$name/"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          ls -la dist/

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ needs.meta.outputs.version }}"
          $name = "pmid_downloader-v$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$name" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/pmid_downloader.exe" "dist/$name/"
          Copy-Item -Recurse "migrations" "dist/$name/"
          Copy-Item "README.md" "dist/$name/"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          Get-ChildItem dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmid_downloader-${{ matrix.target }}
          path: pubmed_mcp/dist/pmid_downloader-v${{ needs.meta.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [meta, docker, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: pmid_downloader-*
          merge-multiple: true

      - name: Show artifacts
        run: ls -la dist/

      - name: Release-drafter publish
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-pubmed_mcp.yml
          name: "pubmed_mcp v${{ needs.meta.outputs.version }}"
          tag: ${{ github.ref_name }}
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
          append_body: true
          body: |

            ### Container image
            ```
            docker pull ghcr.io/${{ github.repository }}/pmid_downloader:v${{ needs.meta.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

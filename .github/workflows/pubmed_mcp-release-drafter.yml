name: pubmed_mcp · Release Drafter

on:
  push:
    branches: [main]
    paths:
      - "pubmed_mcp/**"
      - ".github/release-drafter-pubmed_mcp.yml"
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
    paths:
      - "pubmed_mcp/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-pubmed_mcp.yml
          commitish: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
